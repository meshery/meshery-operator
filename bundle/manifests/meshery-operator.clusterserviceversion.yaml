  description: Meshery Operator is the multi-service mesh operator and implementation
    of MeshSync.
  displayName: meshery-operator
  icon:
  - base64data: ""
    mediatype: ""
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          - services
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - apps
          resources:
          - deployments
          - statefulsets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - authentication.k8s.io
          resources:
          - tokenreviews
          verbs:
          - create
        - apiGroups:
          - authorization.k8s.io
          resources:
          - subjectaccessreviews
          verbs:
          - create
        - apiGroups:
          - meshery.io
          resources:
          - brokers
          - meshsyncs
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - meshery.io
          resources:
          - brokers/finalizers
          - meshsyncs/finalizers
          verbs:
          - update
        - apiGroups:
          - meshery.io
          resources:
          - brokers/status
          - meshsyncs/status
          verbs:
          - get
          - patch
          - update
        serviceAccountName: meshery-operator
      deployments:
      - label:
          app: meshery
          component: operator
        name: meshery-operator
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: meshery
              component: operator
          strategy: {}
          template:
            metadata:
              labels:
                app: meshery
                component: operator
            spec:
              containers:
              - args:
                - --enable-leader-election
                - --metrics-addr=:8443
                - --health-probe-bind-address=:8081
                command:
                - /manager
                image: meshery/meshery-operator:stable-latest
                imagePullPolicy: Always
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: health
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                ports:
                - containerPort: 9443
                  name: server
                - containerPort: 8443
                  name: https-metrics
                - containerPort: 8081
                  name: health
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: health
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 256Mi
                  requests:
                    cpu: 100m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  readOnlyRootFilesystem: true
              securityContext:
                runAsGroup: 65532
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile:
                  type: RuntimeDefault
              serviceAccountName: meshery-operator
              terminationGracePeriodSeconds: 10
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: meshery-operator
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - servicemesh
  - meshSync
