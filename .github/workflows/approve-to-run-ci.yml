name: Meshery-Operator CI
permissions: read-all

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
    golangci-lint:
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout code
            uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
          - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: golangci-lint
            uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
            with:
              version: v2.12.2
    tidy:
        name: Go mod tidy
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout code
            uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
          - name: Set up Go
            uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: Run go mod tidy
            run: make tidy
    test:
        # do not require golandci-lint before codecov, there are some issues there to address, we still want unit tests to run
        needs: [tidy]
        name: Unit tests
        if: github.repository == 'meshery/meshery-operator'
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout code
            uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
          - name: Set up Go
            uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: Set up test-env
            run: make test-env
          - name: Run unit tests
            run: make test
         
    # if review comment includes approved or LGTM, run the tests
    # if review comment includes changes requested, do not run the tests
    # if review comment includes approved or LGTM, run the tests
    build:
        needs: [golangci-lint, tidy, test]
        name: Build
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout code
            uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
          - name: Set up Go
            uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: Build
            run: make build

    # Fail the build if committed generated artifacts (DeepCopy, CRDs, RBAC,
    # webhook manifests) drift from the Go source. Bundle regeneration is not
    # gated here because it requires the operator-sdk binary; see WS-1/WS-8.
    manifests-drift:
        name: Generated manifests drift gate
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout code
            uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
          - name: Set up Go
            uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: Regenerate manifests and DeepCopy
            run: make manifests generate
          - name: Verify no drift
            run: |
              if ! git diff --exit-code; then
                echo "::error::Generated files are out of date. Run 'make manifests generate' and commit the result."
                exit 1
              fi
