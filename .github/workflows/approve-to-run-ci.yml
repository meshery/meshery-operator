name: Meshery-Operator CI
permissions: read-all

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

# Fall back to direct fetches on ANY module-proxy error (the comma form only
# falls back on 404/410, not transient proxy 5xx/stream errors).
env:
  GOPROXY: https://proxy.golang.org|direct

jobs:
    golangci-lint:
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        steps:
          - name: Checkout code
            uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
          - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: golangci-lint
            uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
            with:
              version: v2.12.2
    tidy:
        name: Go mod tidy
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        steps:
          - name: Checkout code
            uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
          - name: Set up Go
            uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: Run go mod tidy
            run: make tidy
          # `go mod tidy` exits 0 whether or not it changed anything; without
          # this diff the job can never fail and verifies nothing.
          - name: Verify go.mod/go.sum are tidy
            run: git diff --exit-code go.mod go.sum
    test:
        name: Unit tests
        if: github.repository == 'meshery/meshery-operator'
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        steps:
          - name: Checkout code
            uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
          - name: Set up Go
            uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          # make test depends on test-env itself; no separate setup step needed.
          - name: Run unit tests
            run: make test

    # Independent of lint/tidy/test: serializing these jobs only added wall
    # clock, it gated nothing (any red job blocks the PR either way).
    build:
        name: Build
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        steps:
          - name: Checkout code
            uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
          - name: Set up Go
            uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: Build
            run: make build

    # Fail the build if committed generated artifacts (DeepCopy, CRDs, RBAC,
    # webhook manifests) drift from the Go source. Bundle regeneration is not
    # gated here because it requires the operator-sdk binary; see WS-1/WS-8.
    manifests-drift:
        name: Generated manifests drift gate
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        steps:
          - name: Checkout code
            uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
          - name: Set up Go
            uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
            with:
              go-version-file: go.mod
              cache: true
              cache-dependency-path: go.sum
          - name: Regenerate manifests and DeepCopy
            run: make manifests generate
          - name: Verify no drift
            run: |
              if ! git diff --exit-code; then
                echo "::error::Generated files are out of date. Run 'make manifests generate' and commit the result."
                exit 1
              fi
