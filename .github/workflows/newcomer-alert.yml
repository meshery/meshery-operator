name: Newcomers Alert
permissions: read-all

on:
  issues:
    types: [labeled]
jobs:
  good-first-issue-notify:
    if: github.event.label.name == 'good first issue' || github.event.label.name == 'first-timers-only' 
    name: Notify Slack for new good-first-issue
    runs-on: ubuntu-24.04
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C019426UBNY
            text: "A good first issue label was just added to <${{ github.event.issue.html_url }}|${{ github.event.issue.title }}>."