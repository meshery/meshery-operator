name: Integration Tests
permissions: read-all

on:
  push:
    branches:
      - "master"
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "config/**"
      - "integration-tests/**"
      - ".github/workflows/integration-tests-ci.yml"
  pull_request:
    branches:
      - "master"
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "config/**"
      - "integration-tests/**"
      - ".github/workflows/integration-tests-ci.yml"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "info"

# Fall back to direct fetches on ANY module-proxy error: the default
# comma-separated GOPROXY only falls back on 404/410, so a transient proxy
# 5xx/stream error fails the whole job.
env:
  GOPROXY: https://proxy.golang.org|direct

jobs:
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    # The script's internal waits sum to ~38 minutes worst-case; anything past
    # that is a hang, not a slow run.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: Install Kind and kubectl
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          # Binaries only: main.sh creates its own cluster. Without this the
          # action spins up a second, unused kind cluster that competes with
          # the real one for the runner's CPU.
          install_only: true
      - name: Integration tests set up
        run: make integration-tests-setup
        env:
          # Pin the Kubernetes version under test so kind-action bumps don't
          # change it silently; keep aligned with ENVTEST_K8S_VERSION.
          KIND_NODE_IMAGE: kindest/node:v1.35.0
      - name: Integration tests set up - print debug output
        run: |
          mkdir -p integration-tests
          make integration-tests-setup-debug-output 2>&1 | tee integration-tests/setup-debug.log
          echo "Integration tests setup failed - stopping workflow"
          exit 1
        if: failure()
      - name: Integration tests run
        run: make integration-tests-run
      - name: Integration tests run - print debug output
        run: |
          mkdir -p integration-tests
          make integration-tests-setup-debug-output 2>&1 | tee integration-tests/assert-debug.log
        if: failure()
      - name: Integration tests clean up
        run: make integration-tests-cleanup
        if: always()
      - name: Upload integration test logs (if any)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: operator-logs
          path: integration-tests/*.log
          if-no-files-found: warn
