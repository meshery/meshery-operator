version: "2"

linters:
  
  enable:
    - goconst
    - gocritic
    - govet
    - staticcheck      
    - unused
    - cyclop
  
  settings:
    goconst:
      min-len: 3
      min-occurrences: 3
    
    govet:
      enable-all: true
    
    staticcheck:
      checks: ["all"]
    
    unused:
      exported-fields-are-used: false
    
    cyclop:
      max-complexity: 15
  
  exclusions:
    warn-unused: true
    
    generated: 'disable'
    
    rules:
      - path: "_test\\.go"
        linters:
          - testpackage
      
      - path: "(vendor|bundle|config|hack|helpers|img)/.*"
        linters:
          - gocritic
          - goconst
          - govet
          - staticcheck
          - unused
          - cyclop
          - exportloopref
          - shadow

formatters:
  enable:
    - gci
    - gofmt
    - goimports
  
  settings:
    gci:
      sections:
        - standard
        - default
    
    gofmt:
      simplify: true

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
