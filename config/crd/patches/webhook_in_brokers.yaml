# Enables the conversion webhook for the Broker CRD (apiextensions.k8s.io/v1).
# The caBundle is injected by cert-manager via the annotation added in
# cainjection_in_brokers.yaml. The service name/namespace are the deterministic
# names kustomize produces (namePrefix meshery-, namespace meshery).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: brokers.meshery.io
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          namespace: meshery
          name: meshery-webhook-service
          path: /convert
      conversionReviewVersions:
        - v1
