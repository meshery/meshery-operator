# Tells cert-manager's ca-injector to inject the serving CA into the Broker
# CRD's conversion webhook clientConfig. Points at the cert-manager Certificate
# meshery-serving-cert in namespace meshery (deterministic kustomize names).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cert-manager.io/inject-ca-from: meshery/meshery-serving-cert
  name: brokers.meshery.io
