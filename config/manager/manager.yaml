---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: meshery
    component: operator
  name: meshery-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meshery-operator
  namespace: meshery
  labels:
    app: meshery
    component: operator
spec:
  selector:
    matchLabels:
      app: meshery
      component: operator
  replicas: 1
  template:
    metadata:
      labels:
        app: meshery
        component: operator
    spec:
      terminationGracePeriodSeconds: 10
      serviceAccountName: meshery-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: meshery/meshery-operator:stable-latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 9443
          name: server
        - containerPort: 8080
          name: metrics
        - containerPort: 8081
          name: health
        command:
        - /manager
        args:
        - --enable-leader-election
        - --metrics-addr=:8080
        - --health-probe-bind-address=:8081
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
