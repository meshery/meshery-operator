---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operator-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - meshery.io
  resources:
  - brokers
  - meshsyncs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - meshery.io
  resources:
  - brokers/finalizers
  - meshsyncs/finalizers
  verbs:
  - update
- apiGroups:
  - meshery.io
  resources:
  - brokers/status
  - meshsyncs/status
  verbs:
  - get
  - patch
  - update
